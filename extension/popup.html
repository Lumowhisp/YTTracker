<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      width: 320px;
      background: #06080f;
      color: #f1f5f9;
      overflow: hidden;
    }
    .header {
      padding: 20px 20px 16px;
      background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(236,72,153,0.1));
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 span { background: linear-gradient(to right, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { font-size: 12px; color: #64748b; margin-top: 4px; }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #10b981;
      margin-top: 8px;
    }
    .status .dot {
      width: 6px; height: 6px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px 20px;
    }
    .stat-card {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(139,92,246,0.3); }
    .stat-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
    }
    .stat-unit { font-size: 12px; color: #64748b; font-family: 'Inter', sans-serif; font-weight: 400; }
    .score-card {
      grid-column: span 2;
      display: flex;
      align-items: center;
      gap: 16px;
      background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(6,182,212,0.05));
      border-color: rgba(139,92,246,0.15);
    }
    .score-ring {
      position: relative;
      width: 56px; height: 56px;
      flex-shrink: 0;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring circle { fill: none; stroke-width: 5; }
    .score-ring .bg { stroke: rgba(255,255,255,0.06); }
    .score-ring .fg { stroke: url(#scoreGrad); stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
    .score-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
    }
    .score-info .stat-label { margin-bottom: 2px; }
    .score-info p { font-size: 12px; color: #94a3b8; }
    .actions { padding: 0 20px 20px; }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      color: white;
      text-align: center;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn:hover { opacity: 0.9; transform: scale(1.02); }
    .loading {
      padding: 40px 20px;
      text-align: center;
      color: #64748b;
      font-size: 13px;
    }
    .loading .spinner {
      width: 24px; height: 24px;
      border: 3px solid rgba(255,255,255,0.06);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Zen Mode Toggle */
    .zen-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .zen-label {
      font-size: 13px;
      font-weight: 600;
      color: #f1f5f9;
      display: flex;
      align-items: center;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(255,255,255,0.1);
      transition: .3s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
    }
    input:checked + .slider:before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ Activity<span>Tracker</span></h1>
    <p>YouTube productivity insights</p>
    <div class="status">
      <div class="dot"></div>
      <span>Tracking active</span>
    </div>
    
    <div class="zen-toggle">
      <span class="zen-label">Zen Mode <span style="font-size: 10px; color: #94a3b8; font-weight: 400; margin-left: 4px;">(Blocks Shorts)</span></span>
      <label class="switch">
        <input type="checkbox" id="zenModeToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Loading today's stats...
    </div>
  </div>

  <div class="actions">
    <a href="http://localhost:5173/dashboard" target="_blank" class="btn">Open Full Dashboard →</a>
  </div>

  <svg width="0" height="0"><defs>
    <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs></svg>

  <script src="popup.js"></script>
</body>
</html>
