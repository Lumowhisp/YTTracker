<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      width: 300px;
      padding: 20px;
      background-color: #1a1a1a;
      color: #fff;
    }
    h2 { margin-top: 0; font-size: 18px; color: #a855f7; }
    p { font-size: 14px; color: #a1a1aa; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: linear-gradient(to right, #a855f7, #ec4899);
      color: white;
      text-align: center;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      margin-top: 15px;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h2>Activity Tracker Active</h2>
  <p>We are quietly tracking your YouTube watch time and learning progress in the background.</p>
  <a href="http://localhost:5173" target="_blank" class="btn">Open Dashboard</a>
  <script src="popup.js"></script>
</body>
</html>
